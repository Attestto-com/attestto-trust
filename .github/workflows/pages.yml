name: deploy-site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'countries/**'
      - '.github/workflows/pages.yml'
  pull_request:
    paths:
      - 'site/**'
      - 'countries/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Standard GitHub Pages permissions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; queue new pushes.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install site dependencies
        working-directory: site
        run: npm install

      - name: Build site
        working-directory: site
        run: npm run build

      # Artifact upload needs pages:write, which PRs (incl. Dependabot) lack.
      # On PRs we only validate that the site builds; deploy is main-only.
      - uses: actions/configure-pages@v5
        if: github.event_name != 'pull_request'

      - uses: actions/upload-pages-artifact@v3
        if: github.event_name != 'pull_request'
        with:
          path: site/dist

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
